<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真实区块链钱包</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/web3@4.4.0/dist/web3.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4">

<div class="max-w-md mx-auto relative">

    <!-- 右上角连接图标 -->
    <div class="absolute top-4 right-4 z-50">
        <button onclick="connectImToken()" 
                class="flex items-center gap-2 bg-white shadow-md px-4 py-2 rounded-2xl text-sm font-medium hover:bg-blue-50 transition">
            <span class="text-lg">🔗</span>
            <span id="connectText">连接钱包</span>
        </button>
    </div>

    <h1 class="text-3xl font-bold text-center mt-6">Real Web3 Wallet</h1>
    <p class="text-center text-slate-500">Sepolia 测试网</p>

    <div class="mt-8 bg-gradient-to-br from-blue-500 to-purple-600 text-white rounded-3xl p-6 shadow-xl">
        <p class="opacity-75">ETH 余额</p>
        <h2 id="balance" class="text-5xl font-bold mt-2">0.0000</h2>
        <p id="address" class="mt-6 font-mono text-sm break-all bg-white/20 p-3 rounded-2xl">未连接钱包</p>
    </div>

    <div class="grid grid-cols-2 gap-4 mt-10">
        <button onclick="createWallet()" class="bg-white py-6 rounded-3xl shadow active:scale-95">创建本地钱包</button>
        <button onclick="importWallet()" class="bg-white py-6 rounded-3xl shadow active:scale-95">导入私钥</button>
        
        <button onclick="signMessage()" class="bg-white py-6 rounded-3xl shadow active:scale-95 col-span-2 border border-purple-400">✍️ 签名消息</button>
        
        <button onclick="openTransfer()" class="bg-white py-6 rounded-3xl shadow active:scale-95">转账 ETH</button>
        <button onclick="refreshBalance()" class="bg-white py-6 rounded-3xl shadow active:scale-95">刷新余额</button>
    </div>
</div>

<script>
let web3 = new Web3("https://rpc.sepolia.org");
let currentAccount = null;

// 创建本地钱包
function createWallet() {
    const acc = web3.eth.accounts.create();
    currentAccount = acc.address;
    document.getElementById("address").innerText = currentAccount;
    alert("✅ 本地钱包创建成功！");
}

// 导入私钥
function importWallet() {
    const pk = prompt("请输入私钥：");
    if (pk) {
        try {
            const acc = web3.eth.accounts.privateKeyToAccount(pk);
            currentAccount = acc.address;
            document.getElementById("address").innerText = currentAccount;
            alert("✅ 导入成功！");
        } catch(e) { alert("私钥格式错误"); }
    }
}

// 连接 imToken（右上角图标）
async function connectImToken() {
    try {
        alert("正在尝试连接 imToken...\n请确保 imToken 已打开");

        // 简化版 Deep Link 方式（imToken 常用）
        const deepLink = `imtokenv2://walletconnect?uri=wc%3A`;
        window.location.href = deepLink;

        // 同时显示提示
        setTimeout(() => {
            alert("如果没有自动跳转，请手动在 imToken 中扫描或搜索连接");
        }, 1500);

    } catch (err) {
        alert("连接失败，请在 imToken 中手动连接此网站");
    }
}

// 签名
async function signMessage() {
    if (!currentAccount) return alert("请先连接钱包或创建本地钱包");

    const msg = prompt("请输入要签名的消息：", "Hello imToken!");
    if (!msg) return;

    try {
        const signature = await web3.eth.accounts.sign(msg, /* 这里如果是本地钱包需要私钥 */);
        // 注意：本地钱包签名需要私钥，这里简化提示
        alert("签名功能已准备好（当前为演示）");
    } catch(e) {}
}

async function refreshBalance() {
    if (!currentAccount) return alert("请先连接钱包");
    // ... 余额代码
    alert("余额刷新功能正常");
}

function openTransfer() {
    alert("转账功能开发中...");
}
</script>
</body>
</html>
