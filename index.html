<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真实区块链钱包</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/web3@4.4.0/dist/web3.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4">

<div class="max-w-md mx-auto">
    <h1 class="text-3xl font-bold text-center mt-4">Real Web3 Wallet</h1>
    <p class="text-center text-slate-500">Sepolia 测试网</p>

    <div class="mt-8 bg-gradient-to-br from-blue-500 to-purple-600 text-white rounded-3xl p-6 shadow-xl">
        <p class="opacity-75">ETH 余额</p>
        <h2 id="balance" class="text-5xl font-bold mt-2">0.0000</h2>
        <p id="address" class="mt-6 font-mono text-sm break-all bg-white/20 p-3 rounded-2xl">未连接钱包</p>
    </div>

    <div class="grid grid-cols-2 gap-4 mt-8">
        <button onclick="createWallet()" class="bg-white py-6 rounded-3xl shadow active:scale-95">创建钱包</button>
        <button onclick="importWallet()" class="bg-white py-6 rounded-3xl shadow active:scale-95">导入私钥</button>
        
        <button onclick="connectLocalWallet()" class="bg-emerald-500 text-white py-6 rounded-3xl shadow active:scale-95 col-span-2 font-medium">
            🔗 使用本地钱包
        </button>

        <button onclick="signMessage()" class="bg-white py-6 rounded-3xl shadow active:scale-95 col-span-2 border-2 border-purple-500">
            ✍️ 签名消息
        </button>

        <button onclick="openTransfer()" class="bg-white py-6 rounded-3xl shadow active:scale-95">转账 ETH</button>
        <button onclick="refreshBalance()" class="bg-white py-6 rounded-3xl shadow active:scale-95">刷新余额</button>
    </div>
</div>

<script>
const web3 = new Web3("https://rpc.sepolia.org");
let myWallet = null;

// 创建新钱包
async function createWallet() {
    myWallet = web3.eth.accounts.create();
    await connectLocalWallet();
    alert("✅ 钱包创建成功！\n\n地址：\n" + myWallet.address + "\n\n已自动连接");
}

// 导入私钥
async function importWallet() {
    const pk = prompt("请输入私钥 (可带 0x)：");
    if (!pk) return;
    try {
        myWallet = web3.eth.accounts.privateKeyToAccount(pk);
        await connectLocalWallet();
        alert("✅ 导入成功并已连接！");
    } catch(e) {
        alert("❌ 私钥格式错误");
    }
}

// 本地钱包“连接”功能（核心）
async function connectLocalWallet() {
    if (!myWallet) {
        return alert("请先创建或导入钱包");
    }
    
    document.getElementById("address").innerText = myWallet.address;
    alert("✅ 本地钱包已连接！\n你可以进行签名等操作");
    refreshBalance();
}

// 刷新余额
async function refreshBalance() {
    if (!myWallet) return alert("请先连接钱包");
    try {
        const bal = await web3.eth.getBalance(myWallet.address);
        document.getElementById("balance").innerText = parseFloat(web3.utils.fromWei(bal, 'ether')).toFixed(4);
    } catch(e) {
        console.error(e);
    }
}

// 签名消息（支持本地钱包）
async function signMessage() {
    if (!myWallet) return alert("请先创建/导入并连接钱包");

    const message = prompt("请输入要签名的消息：", "欢迎使用我的 Web3 钱包！");
    if (!message) return;

    try {
        const signature = await web3.eth.accounts.sign(message, myWallet.privateKey).signature;
        
        alert(`✅ 签名成功！\n\n消息：${message}\n\n签名结果：\n${signature}`);
        
        // 复制到剪贴板
        await navigator.clipboard.writeText(signature);
        alert("签名已复制到剪贴板 ✓");
    } catch (err) {
        alert("签名失败：" + err.message);
    }
}

function openTransfer() {
    alert("转账功能开发中...\n\n当前支持：创建钱包 + 签名");
}
</script>
</body>
</html>
