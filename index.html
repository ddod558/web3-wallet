<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>多链钱包（双模式·真正Token Core版）</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@4.0.1/dist/web3.min.js"></script>
  <!-- 官方 Token Core 内核 -->
  <script src="https://cdn.jsdelivr.net/npm/@trustwallet/wallet-core@3.4.0/dist/browser/wallet-core.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", sans-serif;
    }

    body {
      min-height: 100vh;
      background: url('https://i.imgur.com/NlF8VQd.png') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      padding: 30px 15px;
      position: relative;
      overflow-x: hidden;
    }

    .main-title {
      text-align: center;
      font-size: 46px;
      font-weight: bold;
      margin-bottom: 30px;
      color: #ffffff;
      text-shadow: 0 0 10px #7b42ff;
      letter-spacing: 2px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .card {
      background: rgba(39, 28, 78, 0.85);
      backdrop-filter: blur(6px);
      border: 1px solid #413280;
      border-radius: 28px;
      padding: 26px;
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px dashed #8c78d8;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title::before {
      content: "★";
      color: #ff7cb9;
      font-size: 26px;
    }

    select, input, textarea {
      width: 100%;
      padding: 18px 20px;
      margin: 14px 0;
      border-radius: 18px;
      border: 1px solid #4168c9;
      background: rgba(30, 20, 71, 0.85);
      color: #fff;
      font-size: 18px;
      outline: none;
    }

    .btn {
      width: 100%;
      padding: 18px;
      margin-top: 14px;
      border-radius: 18px;
      border: none;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(90deg, #7b42ff, #42a0ff);
      color: #fff;
    }

    .btn-group{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
    }

    .show-text {
      margin-top: 18px;
      padding: 18px;
      background: rgba(30, 20, 71, 0.85);
      border-radius: 18px;
      border-left: 5px solid #ff7cb9;
      word-break: break-all;
      font-size: 17px;
      line-height: 1.7;
    }

    @media (max-width: 600px) {
      .main-title { font-size: 36px; }
      .card { padding: 20px; }
      .card-title { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="main-title">多链钱包（双模式）</h1>

    <div class="card">
      <h3 class="card-title">主网切换中心</h3>
      <select id="network">
        <option value="1">✨ ETH 以太坊主网</option>
        <option value="56">✨ BNB Chain 币安智能链</option>
        <option value="137">✨ Polygon 马蹄链</option>
      </select>
    </div>

    <div class="card">
      <h3 class="card-title">钱包连接（双模式）</h3>
      <div class="btn-group">
        <button class="btn" onclick="connectWallet()">连接 ImToken 钱包</button>
        <button class="btn" onclick="showLocalWallet()">导入私钥(Token Core)</button>
      </div>
      <div id="localWalletBox" style="display:none;margin-top:15px;">
        <textarea id="privateKey" placeholder="请输入您的钱包私钥"></textarea>
        <button class="btn" onclick="importByTokenCore()">确认导入(Token Core签名)</button>
      </div>
      <div id="walletAddr" class="show-text" style="display: none;"></div>
    </div>

    <div class="card">
      <h3 class="card-title">代币转账（支持自定义Gas）</h3>
      <select id="token">
        <option value="ETH">🪙 ETH 原生代币</option>
        <option value="ETH_USDT">🪙 ETH链 USDT 稳定币</option>
        <option value="BNB">🪙 BNB 原生代币</option>
        <option value="BSC_USDT">🪙 BSC链 USDT 稳定币</option>
      </select>
      <input type="text" id="to" placeholder="输入接收钱包地址 0x...">
      <input type="number" id="amount" placeholder="输入转账数量">
      <input type="number" id="gasPrice" placeholder="Gas Price(Gwei) 留空为自动">
      <input type="number" id="gasLimit" placeholder="Gas Limit 留空自动">
      <button class="btn" onclick="sendTx()">确认发起转账</button>
    </div>

    <div class="card">
      <h3 class="card-title">链上交易溯源查询</h3>
      <input type="text" id="txHash" placeholder="输入交易哈希 TxHash">
      <button class="btn" onclick="queryTx()">查询链上详情</button>
      <div id="txResult" class="show-text" style="display: none;"></div>
    </div>
  </div>

<script>
// 链配置
const RPC = {
  1: "https://mainnet.infura.io/v3/YOUR_KEY",
  56: "https://bsc-dataseed.binance.org",
  137: "https://polygon-rpc.com"
};

const EXPLORER = {
  1: "https://etherscan.io/tx/",
  56: "https://bscscan.com/tx/",
  137: "https://polygonscan.com/tx/"
};

const USDT = {
  1: "0xdAC17F958D2ee523a2206206994597C13D831ec7",
  56: "0x55d398326f99059fF775485246999027B3197955",
  137: "0xc2132D05D31c914a87C6611C10748Acd29181247"
};

let web3;
let userAddress;
let isLocalWallet = false;
let corePrivateKey = null; // Token Core 原生私钥对象
let coreChainId;

// ========== 真正初始化 Token Core 内核 ==========
async function initTokenCore() {
  await WalletCore.init();
}
initTokenCore();

function showLocalWallet(){
  document.getElementById("localWalletBox").style.display = "block";
}

// ========== 真正使用 Token Core 解析私钥（不再用Web3） ==========
async function importByTokenCore(){
  const pkHex = document.getElementById("privateKey").value.trim();
  if(!pkHex) return alert("请输入私钥");

  try {
    coreChainId = parseInt(document.getElementById("network").value);
    // 1. Token Core 底层：私钥对象创建
    corePrivateKey = WalletCore.PrivateKey.createWithHexString(pkHex);
    // 2. Token Core 底层：导出公钥 → 钱包地址
    const pubKey = corePrivateKey.getPublicKey(false);
    const address = WalletCore.EthereumAddress.createWithPublicKey(pubKey).description();

    userAddress = address;
    isLocalWallet = true;

    const dom = document.getElementById("walletAddr");
    dom.style.display = "block";
    dom.innerHTML = "✅ Token Core 内核连接成功：" + userAddress;
  } catch(e){
    alert("Token Core 解析私钥失败："+e.message);
  }
}

// ImToken 模式（保留不变）
async function connectWallet() {
  if (!window.ethereum) {
    alert("请在 ImToken 内置浏览器打开页面！");
    return;
  }
  isLocalWallet = false;
  corePrivateKey = null;

  const chainId = document.getElementById("network").value;
  try {
    await window.ethereum.request({
      method: 'wallet_switchEthereumChain',
      params: [{ chainId: '0x' + parseInt(chainId).toString(16) }]
    });

    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    userAddress = accounts[0];
    web3 = new Web3(window.ethereum);

    const signMessage = "欢迎使用多链钱包，请签名完成登录授权";
    await window.ethereum.request({
      method: "personal_sign",
      params: [web3.utils.utf8ToHex(signMessage), userAddress]
    });

    const dom = document.getElementById("walletAddr");
    dom.style.display = "block";
    dom.innerHTML = "✅ ImToken 签名连接成功：" + userAddress;
  } catch (e) {
    alert("连接失败：" + e.message);
  }
}

// ========== 转账：本地钱包使用 Token Core 原生签名，不再依赖 Web3 签名 ==========
async function sendTx() {
  if (!web3 && !isLocalWallet) return alert("请先连接钱包");

  const chainId = document.getElementById("network").value;
  const token = document.getElementById("token").value;
  const to = document.getElementById("to").value.trim();
  const amount = document.getElementById("amount").value;
  const gasPrice = document.getElementById("gasPrice").value;
  const gasLimit = document.getElementById("gasLimit").value;

  if (!to || !amount) return alert("请填写完整信息");

  const rpcUrl = RPC[chainId];
  const tempWeb3 = new Web3(rpcUrl);

  // 组装交易参数
  let txObj = {
    from: userAddress,
    to: to,
    value: "0x0",
    gasPrice: gasPrice ? tempWeb3.utils.toHex(tempWeb3.utils.toWei(gasPrice, 'gwei')) : undefined,
    gas: gasLimit ? tempWeb3.utils.toHex(gasLimit) : undefined,
    nonce: await tempWeb3.eth.getTransactionCount(userAddress)
  };

  // 处理不同代币
  if(token === "ETH"){
    if(chainId !== 1) return alert("请切换ETH主网");
    txObj.value = tempWeb3.utils.toHex(tempWeb3.utils.toWei(amount, 'ether'));
  } else if(token === "BNB"){
    if(chainId !== 56) return alert("请切换BNB链");
    txObj.value = tempWeb3.utils.toHex(tempWeb3.utils.toWei(amount, 'ether'));
  } else if(token === "ETH_USDT"){
    if(chainId !==1) return alert("请切换ETH主网");
    const data = tempWeb3.eth.abi.encodeFunctionCall({
      name:"transfer",inputs:[{type:"address"},{type:"uint256"}]
    },[to,tempWeb3.utils.toWei(amount,'mwei')]);
    txObj.to = USDT[1];
    txObj.data = data;
  } else if(token === "BSC_USDT"){
    if(chainId !==56) return alert("请切换BNB链");
    const data = tempWeb3.eth.abi.encodeFunctionCall({
      name:"transfer",inputs:[{type:"address"},{type:"uint256"}]
    },[to,tempWeb3.utils.toWei(amount,'mwei')]);
    txObj.to = USDT[56];
    txObj.data = data;
  }

  try{
    if(isLocalWallet){
      // ========== 核心：使用 Token Core 底层签名交易 ==========
      const txData = WalletCore.EthereumTransaction.signTransaction(
        corePrivateKey,
        txObj.nonce,
        txObj.gasPrice || "0",
        txObj.gas || "0",
        txObj.to,
        txObj.value,
        txObj.data || "0x",
        coreChainId
      );
      const signedHex = txData;
      const receipt = await tempWeb3.eth.sendSignedTransaction(signedHex);
      alert("✅ Token Core 签名转账成功："+receipt.transactionHash);
    }else{
      // ImToken 模式不变
      const tx = await web3.eth.sendTransaction(txObj);
      alert("✅ ImToken 转账成功："+tx.transactionHash);
    }
  }catch(e){
    alert("❌ 转账失败："+e.message);
  }
}

async function queryTx() {
  const hash = document.getElementById("txHash").value.trim();
  if (!hash) return alert("请输入交易哈希");
  const chainId = document.getElementById("network").value;
  const rpc = new Web3(RPC[chainId]);
  try {
    const res = await rpc.eth.getTransactionReceipt(hash);
    const dom = document.getElementById("txResult");
    dom.style.display = "block";
    dom.innerHTML = `
      交易状态：${res.status ? '成功' : '失败'}<br>
      区块高度：${res.blockNumber}<br>
      区块浏览器：<a href="${EXPLORER[chainId] + hash}" target="_blank" style="color:#4facff">点击查看</a>
    `;
  } catch (e) {
    alert("查询失败");
  }
}
</script>
</body>
</html>
