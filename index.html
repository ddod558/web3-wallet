<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>多链钱包</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@4.0.1/dist/web3.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", sans-serif;
    }

    body {
      min-height: 100vh;
      background-color: #121218;
      color: #fff;
      padding: 30px 15px;
      position: relative;
      overflow-x: hidden;
    }

    /* 主标题 完全匹配截图 */
    .main-title {
      text-align: center;
      font-size: 46px;
      font-weight: bold;
      margin-bottom: 30px;
      color: #ffffff;
      text-shadow: 0 0 10px #7b42ff;
      letter-spacing: 2px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    /* 卡片样式 严格复刻截图 */
    .card {
      background: #271c4e;
      border: 1px solid #413280;
      border-radius: 28px;
      padding: 26px;
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px dashed #8c78d8;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title::before {
      content: "★";
      color: #ff7cb9;
      font-size: 26px;
    }

    /* 下拉框、输入框 */
    select, input {
      width: 100%;
      padding: 18px 20px;
      margin: 14px 0;
      border-radius: 18px;
      border: 1px solid #4168c9;
      background: #1e1447;
      color: #fff;
      font-size: 18px;
      outline: none;
    }

    /* 连接按钮 蓝紫渐变 */
    .btn {
      width: 100%;
      padding: 18px;
      margin-top: 14px;
      border-radius: 18px;
      border: none;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(90deg, #7b42ff, #42a0ff);
      color: #fff;
    }

    /* 连接成功提示框 完全和截图一致 */
    .show-text {
      margin-top: 18px;
      padding: 18px;
      background: #1e1447;
      border-radius: 18px;
      border-left: 5px solid #ff7cb9;
      word-break: break-all;
      font-size: 17px;
      line-height: 1.7;
    }

    /* 移动端适配 */
    @media (max-width: 600px) {
      .main-title {
        font-size: 36px;
      }
      .card {
        padding: 20px;
      }
      .card-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="main-title">多链钱包</h1>

    <!-- 主网切换 -->
    <div class="card">
      <h3 class="card-title">主网切换中心</h3>
      <select id="network">
        <option value="1">✨ ETH 以太坊主网</option>
        <option value="56">✨ BNB Chain 币安智能链</option>
        <option value="137">✨ Polygon 马蹄链</option>
      </select>
    </div>

    <!-- ImToken连接 -->
    <div class="card">
      <h3 class="card-title">ImToken 钱包连接</h3>
      <button class="btn" onclick="connectWallet()">连接 ImToken 钱包</button>
      <div id="walletAddr" class="show-text" style="display: none;"></div>
    </div>

    <!-- 代币转账 -->
    <div class="card">
      <h3 class="card-title">代币转账（支持自定义Gas）</h3>
      <select id="token">
        <option value="BNB">🪙 BNB 原生代币</option>
        <option value="USDT">🪙 USDT 稳定币</option>
      </select>
      <input type="text" id="to" placeholder="输入接收钱包地址 0x...">
      <input type="number" id="amount" placeholder="输入转账数量">
      <input type="number" id="gasPrice" placeholder="Gas Price(Gwei) 留空为自动">
      <button class="btn" onclick="sendTx()">确认发起转账</button>
    </div>

    <!-- 交易查询 -->
    <div class="card">
      <h3 class="card-title">链上交易溯源查询</h3>
      <input type="text" id="txHash" placeholder="输入交易哈希 TxHash">
      <button class="btn" onclick="queryTx()">查询链上详情</button>
      <div id="txResult" class="show-text" style="display: none;"></div>
    </div>
  </div>

<script>
// 链配置
const RPC = {
  1: "https://mainnet.infura.io/v3/YOUR_KEY",
  56: "https://bsc-dataseed.binance.org",
  137: "https://polygon-rpc.com"
};

const EXPLORER = {
  1: "https://etherscan.io/tx/",
  56: "https://bscscan.com/tx/",
  137: "https://polygonscan.com/tx/"
};

// USDT 合约地址
const USDT = {
  1: "0xdAC17F958D2ee523a2206206994597C13D831ec7",
  56: "0x55d398326f99059fF775485246999027B3197955",
  137: "0xc2132D05D31c914a87C6611C10748Acd29181247"
};

let web3;
let userAddress;

// 【关键修改】删除自动连接代码，只保留手动连接
async function connectWallet() {
  if (!window.ethereum) {
    alert("请在 ImToken 内置浏览器打开页面！");
    return;
  }

  const chainId = document.getElementById("network").value;
  try {
    await window.ethereum.request({
      method: 'wallet_switchEthereumChain',
      params: [{ chainId: '0x' + parseInt(chainId).toString(16) }]
    });

    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    userAddress = accounts[0];
    web3 = new Web3(window.ethereum);

    const dom = document.getElementById("walletAddr");
    dom.style.display = "block";
    dom.innerHTML = "✅ 连接成功：" + userAddress;
  } catch (e) {
    alert("连接失败：" + e.message);
  }
}

// 转账功能
async function sendTx() {
  if (!web3) return alert("请先连接钱包");

  const chainId = document.getElementById("network").value;
  const token = document.getElementById("token").value;
  const to = document.getElementById("to").value.trim();
  const amount = document.getElementById("amount").value;
  const gasPrice = document.getElementById("gasPrice").value;

  if (!to || !amount) return alert("请填写完整信息");

  const gasOpt = gasPrice ? { gasPrice: web3.utils.toWei(gasPrice, 'gwei') } : {};

  try {
    if (token === "BNB") {
      const tx = await web3.eth.sendTransaction({
        from: userAddress,
        to: to,
        value: web3.utils.toWei(amount, 'ether'),
        ...gasOpt
      });
      alert("转账成功！哈希：" + tx.transactionHash);
    } else {
      const usdtAddr = USDT[chainId];
      const data = web3.eth.abi.encodeFunctionCall({
        name: 'transfer',
        type: 'function',
        inputs: [{ type: 'address' }, { type: 'uint256' }]
      }, [to, web3.utils.toWei(amount, 'mwei')]);

      const tx = await web3.eth.sendTransaction({
        from: userAddress,
        to: usdtAddr,
        data: data,
        ...gasOpt
      });
      alert("转账成功！哈希：" + tx.transactionHash);
    }
  } catch (e) {
    alert("转账失败：" + e.message);
  }
}

// 交易查询
async function queryTx() {
  const hash = document.getElementById("txHash").value.trim();
  if (!hash) return alert("请输入交易哈希");

  const chainId = document.getElementById("network").value;
  const rpc = new Web3(RPC[chainId]);

  try {
    const res = await rpc.eth.getTransactionReceipt(hash);
    const dom = document.getElementById("txResult");
    dom.style.display = "block";
    dom.innerHTML = `
      交易状态：${res.status ? '成功' : '失败'}<br>
      区块高度：${res.blockNumber}<br>
      区块浏览器：<a href="${EXPLORER[chainId] + hash}" target="_blank" style="color:#4facff">点击查看</a>
    `;
  } catch (e) {
    alert("查询失败，哈希无效");
  }
}
</script>
</body>
</html>
