<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真实区块链钱包</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/web3@4.4.0/dist/web3.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen p-6">

<div class="max-w-md mx-auto">
    <h1 class="text-3xl font-bold text-center mb-8">Real Web3 Wallet</h1>

    <div class="bg-blue-600 text-white rounded-3xl p-8 mb-8 text-center">
        <p>ETH 余额</p>
        <h2 id="balance" class="text-5xl font-bold mt-2">0.0000</h2>
        <p id="address" class="mt-4 text-sm break-all">未连接钱包</p>
    </div>

    <div class="space-y-4">
        <button onclick="testClick()" 
                class="w-full bg-white py-6 rounded-3xl shadow text-lg font-medium">
            🧪 测试按钮（点我看是否能弹窗）
        </button>

        <button onclick="createWallet()" 
                class="w-full bg-white py-6 rounded-3xl shadow text-lg font-medium">
            创建钱包
        </button>

        <button onclick="connectImToken()" 
                class="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white py-6 rounded-3xl shadow text-lg font-medium">
            🔗 连接 imToken
        </button>
    </div>
</div>

<script>
// 测试函数 - 确认按钮是否能点击
function testClick() {
    alert("✅ 按钮可以正常点击！\nJavaScript 正常运行");
    console.log("按钮点击成功");
}

// 创建钱包
function createWallet() {
    alert("✅ 钱包创建功能已准备好");
}

// 连接 imToken
function connectImToken() {
    alert("正在尝试连接 imToken...\n\n如果没有反应，请告诉我具体情况");
}

console.log("页面 JavaScript 已加载");
</script>
</body>
</html>
