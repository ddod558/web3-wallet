<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

<body class="bg-slate-100 min-h-screen p-4">

<div class="max-w-md mx-auto">
    <h1 class="text-3xl font-bold text-center mt-4">Real Web3 Wallet</h1>

        <button onclick="refreshBalance()" class="bg-white py-6 rounded-3xl shadow active:scale-95">刷新余额</button>
    </div>
</div>

    updateUI();
    alert("✅ 本地钱包创建成功！\n地址:\n" + myWallet.address);
}
