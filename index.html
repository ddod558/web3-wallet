<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真实区块链钱包</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/web3@4.4.0/dist/web3.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-[#f4f7ff] min-h-screen flex flex-col items-center p-6">
<div class="w-full max-w-sm">

    <div class="mb-6 text-center">
        <h1 class="text-3xl font-bold text-slate-800">Real Web3 Wallet</h1>
        <p class="text-sm text-slate-500 mt-1">Sepolia 测试网</p>
    </div>

    <!-- 余额卡片 -->
    <div class="relative overflow-hidden rounded-[32px] bg-gradient-to-br from-[#7aa6ff] to-[#5f7dff] p-6 shadow-2xl mb-8">
        <div class="absolute top-0 right-0 w-40 h-40 bg-white/10 rounded-full -translate-y-10 translate-x-10"></div>
        <div class="absolute bottom-0 left-0 w-28 h-28 bg-white/10 rounded-full translate-y-10 -translate-x-10"></div>
        
        <div class="relative z-10">
            <p class="text-white/80 text-sm">ETH 余额</p>
            <h2 id="balance" class="text-5xl font-black text-white tracking-tighter mt-2">0.0000</h2>
            <p id="address" class="mt-4 text-white/90 text-sm break-all font-mono bg-white/10 p-2 rounded-xl">
                未创建钱包
            </p>
        </div>
    </div>

    <!-- 功能按钮 -->
    <div class="grid grid-cols-2 gap-4">
        <button onclick="createWallet()" 
                class="bg-white rounded-3xl p-5 shadow-lg active:scale-95 transition-all flex flex-col items-center">
            <div class="w-14 h-14 rounded-2xl bg-blue-100 flex items-center justify-center text-3xl mb-3">➕</div>
            <span class="font-medium">创建钱包</span>
        </button>

        <button onclick="importWallet()" 
                class="bg-white rounded-3xl p-5 shadow-lg active:scale-95 transition-all flex flex-col items-center">
            <div class="w-14 h-14 rounded-2xl bg-green-100 flex items-center justify-center text-3xl mb-3">📥</div>
            <span class="font-medium">导入钱包</span>
        </button>

        <button onclick="openTransfer()" 
                class="bg-white rounded-3xl p-5 shadow-lg active:scale-95 transition-all flex flex-col items-center">
            <div class="w-14 h-14 rounded-2xl bg-orange-100 flex items-center justify-center text-3xl mb-3">↗️</div>
            <span class="font-medium">转账 ETH</span>
        </button>

        <button onclick="refreshBalance()" 
                class="bg-white rounded-3xl p-5 shadow-lg active:scale-95 transition-all flex flex-col items-center">
            <div class="w-14 h-14 rounded-2xl bg-purple-100 flex items-center justify-center text-3xl mb-3">🔄</div>
            <span class="font-medium">刷新余额</span>
        </button>
    </div>
</div>

<!-- 导入私钥弹窗 -->
<div id="modalImport" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl w-full max-w-sm p-6">
        <h2 class="text-xl font-bold mb-4">导入私钥</h2>
        <input id="pkInput" type="text" placeholder="0x..." 
               class="w-full border border-gray-300 rounded-2xl px-4 py-4 text-sm mb-4 font-mono">
        <div class="flex gap-3">
            <button onclick="closeAll()" 
                    class="flex-1 py-4 rounded-2xl bg-gray-100 font-medium">取消</button>
            <button onclick="doImport()" 
                    class="flex-1 py-4 rounded-2xl bg-green-500 text-white font-medium">导入</button>
        </div>
    </div>
</div>

<!-- 转账弹窗 -->
<div id="modalTransfer" class="fixed inset-0 bg-black/60
